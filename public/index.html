
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CursoPro LMS</title>
<style>
:root{--bg:#07111f;--panel:#0f172a;--card:#111827;--line:#263247;--text:#f8fafc;--muted:#94a3b8;--brand:#2563eb;--brand2:#7c3aed;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#172554,#07111f 45%);color:var(--text);min-height:100vh}button,input,textarea,select{font:inherit}input,textarea,select{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:#0b1220;color:var(--text);margin-top:8px}textarea{min-height:86px}button{border:0;border-radius:12px;padding:11px 14px;font-weight:800;cursor:pointer}.btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:white}.btn2{background:#1f2937;color:white;border:1px solid var(--line)}.ok{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.35)}.bad{background:rgba(239,68,68,.15);color:var(--bad);border:1px solid rgba(239,68,68,.35)}.warn{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.35)}p{color:var(--muted);line-height:1.5}.hide{display:none!important}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900}.card{background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 20px 55px rgba(0,0,0,.22)}.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}.logo{display:flex;gap:12px;align-items:center}.mark{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-weight:950}.screen{display:none}.screen.active{display:block}.landing{padding:24px}.nav{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between}.hero{max-width:1180px;margin:60px auto;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero h1{font-size:54px;line-height:1;margin:16px 0}.price{font-size:38px;color:var(--ok);font-weight:950;margin:12px 0}.auth{min-height:100vh;display:grid;place-items:center;padding:20px}.auth .card{width:100%;max-width:430px}.app{display:none;min-height:100vh}.side{position:fixed;inset:0 auto 0 0;width:270px;background:rgba(15,23,42,.96);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column}.side button{width:100%;text-align:left;margin-top:7px;background:transparent;color:var(--muted);border:1px solid transparent}.side button.active,.side button:hover{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.35);color:white}.main{margin-left:270px}.top{height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(15,23,42,.8);border-bottom:1px solid var(--line);position:sticky;top:0}.content{padding:24px}.table{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;min-width:760px}td,th{padding:12px;border-bottom:1px solid var(--line);text-align:left;color:var(--muted)}th{background:#0b1220;color:#dbeafe}.lesson{padding:15px;border:1px solid var(--line);background:#0b1220;border-radius:16px;margin-top:10px}.video{margin-top:10px;border-radius:14px;overflow:hidden;background:#000}.video iframe,.video video{width:100%;height:280px;border:0;display:block}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;place-items:center;padding:20px;z-index:50}.modal>div{width:min(850px,96vw);max-height:90vh;overflow:auto}.progress{height:8px;background:#020617;border-radius:999px;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#38bdf8)}@media(max-width:900px){.hero,.g2,.g3{grid-template-columns:1fr}.hero h1{font-size:38px}.side{position:relative;width:100%}.main{margin-left:0}.app{flex-direction:column}}
</style>
</head>
<body>
<section id="landing" class="screen landing active"><div class="nav"><div class="logo"><div class="mark">CP</div><div><b id="brand">CursoPro LMS</b><p class="small">Cursos online</p></div></div><button class="btn2" onclick="show('login')">Entrar</button></div><div class="hero"><div><span class="badge ok">Plataforma profissional</span><h1>Curso online com Pix manual e aprovação pelo admin</h1><p>O aluno compra, envia o comprovante, e você libera o acesso pelo painel.</p></div><div class="card"><h2>Comprar curso</h2><select id="buyCourse"></select><div id="coursePrice" class="price"></div><input id="regName" placeholder="Nome completo"><input id="regEmail" placeholder="E-mail"><input id="regPhone" placeholder="WhatsApp"><input id="regPass" type="password" placeholder="Senha"><button class="btn" style="width:100%;margin-top:12px" onclick="register()">Criar cadastro</button></div></div></section>
<section id="login" class="screen auth"><div class="card"><div class="logo"><div class="mark">CP</div><div><b>Entrar</b><p class="small">Admin ou aluno</p></div></div><input id="loginEmail" placeholder="E-mail"><input id="loginPass" type="password" placeholder="Senha"><button class="btn" style="width:100%;margin-top:12px" onclick="login()">Entrar</button><button class="btn2" style="width:100%;margin-top:8px" onclick="show('landing')">Voltar</button><p class="small" style="margin-top:12px">Admin: admin@curso.local / admin123</p></div></section>
<section id="app" class="app"><aside class="side"><div class="logo"><div class="mark">CP</div><div><b>CursoPro</b><p class="small" id="role"></p></div></div><div id="menu" style="margin-top:18px"></div><button class="btn2" style="margin-top:auto;text-align:center" onclick="logout()">Sair</button></aside><main class="main"><div class="top"><div><b id="title">Dashboard</b><p class="small" id="subtitle"></p></div><div class="actions" id="topActions"></div></div><div class="content" id="content"></div></main></section>
<div class="modal" id="modal"><div class="card" id="modalBody"></div></div>
<script>
let token=localStorage.getItem('token')||'',me=null,page='dashboard',publicData={courses:[],settings:{}};
const adminMenu=[['dashboard','Dashboard'],['courses','Cursos'],['lessons','Aulas'],['payments','Pagamentos'],['students','Alunos'],['reports','Relatórios'],['settings','Configurações']];
const studentMenu=[['dashboard','Início'],['course','Meu curso'],['payment','Pagamento'],['certificate','Certificado']];
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function getEl(id){return document.getElementById(id)}
function hideScreens(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const appEl=getEl('app');
  if(appEl) appEl.style.display='none';
}
function show(id){
  hideScreens();
  const target=getEl(id);
  if(target) target.classList.add('active');
  const sideEl=getEl('side');
  if(sideEl) sideEl.classList.remove('open');
}
function toastMsg(t){
  const el=getEl('toast');
  if(!el) return;
  el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',2800);
}
function toggleMenu(){const sideEl=getEl('side'); if(sideEl) sideEl.classList.toggle('open')}
function statusBadge(s){return `<span class="badge ${s==='paid'||s==='active'?'ok':s==='rejected'?'bad':'warn'}">${s}</span>`}
function safe(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
async function api(url,opt={}){opt.headers=opt.headers||{};if(!(opt.body instanceof FormData))opt.headers['Content-Type']='application/json';if(token)opt.headers.Authorization='Bearer '+token;const r=await fetch(url,opt);let j={};try{j=await r.json()}catch(e){}if(!r.ok)throw new Error(j.error||'Erro na requisição');return j}
async function loadPublic(){try{publicData=await api('/api/public');if(getEl('brand')) brand.textContent=publicData.settings.brand_name||'CursoPro LMS';if(getEl('buyCourse')){buyCourse.innerHTML=publicData.courses.map(c=>`<option value="${c.id}">${safe(c.title)}</option>`).join('');updatePrice()}}catch(e){console.error(e)}}
function updatePrice(){const c=publicData.courses.find(x=>x.id==buyCourse.value);coursePrice.textContent=c?money(c.price):''}
if(getEl('buyCourse')) buyCourse.onchange=updatePrice;
async function register(){try{if(!regName.value||!regEmail.value||!regPass.value)return alert('Preencha nome, e-mail e senha.');const j=await api('/api/auth/register',{method:'POST',body:JSON.stringify({name:regName.value,email:regEmail.value,phone:regPhone.value,password:regPass.value,course_id:buyCourse.value})});token=j.token;localStorage.setItem('token',token);me=j.user;await openApp();toastMsg('Cadastro criado. Veja o Pix na aba Pagamento.')}catch(e){alert(e.message)}}
async function login(){try{const j=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:loginEmail.value,password:loginPass.value})});token=j.token;localStorage.setItem('token',token);me=j.user;await openApp()}catch(e){alert(e.message)}}
async function openApp(){
  hideScreens();
  const appEl=getEl('app');
  if(appEl) appEl.style.display='flex';
  if(!me){me=(await api('/api/me')).user}
  page='dashboard';renderMenu();await render();
}
function logout(){token='';me=null;localStorage.removeItem('token');const sideEl=getEl('side');if(sideEl)sideEl.classList.remove('open');show('landing')}
function renderMenu(){const m=me.role==='admin'?adminMenu:studentMenu;role.textContent=me.role==='admin'?'Administrador':'Aluno';menu.innerHTML=m.map(x=>`<button class="nav-btn ${page===x[0]?'active':''}" onclick="go('${x[0]}')"><span>${x[1]}</span></button>`).join('')}
function go(p){page=p;const sideEl=getEl('side');if(sideEl)sideEl.classList.remove('open');renderMenu();render()}
function setTitle(t,s=''){title.textContent=t;subtitle.textContent=s;topActions.innerHTML=''}
async function render(){content.innerHTML='<div class="grid g3"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';try{me.role==='admin'?await renderAdmin():await renderStudent()}catch(e){content.innerHTML=`<div class="card"><h2>Erro</h2><p>${safe(e.message)}</p></div>`;console.error(e)}}
async function renderAdmin(){if(page==='dashboard')return adminDashboard();if(page==='courses')return adminCourses();if(page==='lessons')return adminLessons();if(page==='payments')return adminPayments();if(page==='students')return adminStudents();if(page==='reports')return adminReports();if(page==='settings')return adminSettings()}
async function adminDashboard(){setTitle('Dashboard','Visão geral');const d=await api('/api/admin/dashboard');content.innerHTML=`<div class="grid g3"><div class="card"><p>Alunos</p><h1>${d.users}</h1></div><div class="card"><p>Pendentes</p><h1>${d.pending}</h1></div><div class="card"><p>Receita</p><h1>${money(d.paid)}</h1></div></div><div class="card" style="margin-top:16px"><h2>Atividades</h2>${d.logs.map(l=>`<div class="lesson"><b>${l.action}</b><p>${l.created_at}</p></div>`).join('')}</div>`}
async function adminCourses(){setTitle('Cursos','Cadastro de cursos');const d=await api('/api/admin/courses');content.innerHTML=`<div class="actions"><button class="btn" onclick="courseModal()">Novo curso</button></div><div class="grid g2" style="margin-top:16px">${d.courses.map(c=>`<div class="card"><h2>${c.title}</h2><p>${c.description}</p><p><b>${money(c.price)}</b> • ${c.workload}</p><div class="actions"><button class="bad" onclick="deleteCourse(${c.id})">Excluir</button></div></div>`).join('')}</div>`}
async function adminLessons(){setTitle('Aulas','PDFs, vídeos e conteúdo');const c=await api('/api/admin/courses');let id=localStorage.courseId||c.courses[0]?.id||'';let html='<select id="courseSelect" onchange="localStorage.courseId=this.value;adminLessons()">'+c.courses.map(x=>`<option value="${x.id}" ${x.id==id?'selected':''}>${x.title}</option>`).join('')+'</select>';if(id){const l=await api('/api/admin/courses/'+id+'/lessons');html+=`<div class="actions" style="margin-top:12px"><button class="btn" onclick="lessonModal(${id})">Nova aula</button></div>${l.lessons.map(a=>`<div class="lesson"><h3>${a.title}</h3><p>${a.summary}</p><p>Status: ${a.active?'Ativa':'Bloqueada'}</p><div class="actions"><button class="bad" onclick="deleteLesson(${a.id})">Excluir</button><button class="btn" onclick="questions(${a.id})">Quiz</button></div></div>`).join('')}`}content.innerHTML='<div class="card">'+html+'</div>'}
async function adminPayments(){setTitle('Pagamentos','Aprovação manual');const d=await api('/api/admin/payments');content.innerHTML=`<div class="table"><table><thead><tr><th>Aluno</th><th>Curso</th><th>Valor</th><th>Status</th><th>Comprovante</th><th>Ações</th></tr></thead><tbody>${d.payments.map(p=>`<tr><td>${p.student_name}<br>${p.email}</td><td>${p.course_title}</td><td>${money(p.amount)}</td><td><span class="badge ${p.status==='paid'?'ok':p.status==='rejected'?'bad':'warn'}">${p.status}</span></td><td>${p.receipt_file?`<a href="${p.receipt_file}" target="_blank">Abrir</a>`:'-'}</td><td><button class="ok" onclick="approve(${p.id})">Aprovar</button><button class="bad" onclick="rejectPay(${p.id})">Recusar</button></td></tr>`).join('')}</tbody></table></div>`}
async function adminStudents(){setTitle('Alunos','Usuários cadastrados');const d=await api('/api/admin/students');content.innerHTML=`<div class="table"><table><thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Matrículas</th></tr></thead><tbody>${d.students.map(s=>`<tr><td>${s.name}</td><td>${s.email}</td><td>${s.phone||'-'}</td><td>${s.enrollments}</td></tr>`).join('')}</tbody></table></div>`}
async function adminReports(){setTitle('Relatórios','Financeiro e desempenho');const d=await api('/api/admin/reports');content.innerHTML=`<div class="grid g2"><div class="card"><h2>Financeiro</h2>${d.finance.map(x=>`<div class="lesson">${x.student} - ${money(x.amount)} - ${x.status}</div>`).join('')}</div><div class="card"><h2>Desempenho</h2>${d.performance.map(x=>`<div class="lesson">${x.student} - ${x.lesson} - ${x.score}%</div>`).join('')}</div></div>`}
async function adminSettings(){setTitle('Configurações','Pix manual e marca');const s=await api('/api/admin/settings');content.innerHTML=`<div class="card"><h2>Pix manual</h2><input id="brandName" value="${s.brand_name||''}" placeholder="Nome da marca"><input id="pixKey" value="${s.pix_key||''}" placeholder="Chave Pix"><input id="certScore" type="number" value="${s.min_certificate_score||70}" placeholder="Nota mínima certificado"><label>QR Code Pix gerado por você</label><input id="pixQR" type="file" accept="image/*"><button class="btn" style="margin-top:12px" onclick="saveSettings()">Salvar configurações</button>${s.pix_qr_file?`<p><a href="${s.pix_qr_file}" target="_blank">Ver QR atual</a></p>`:''}</div>`}
async function saveSettings(){const f=new FormData();f.append('brand_name',brandName.value);f.append('pix_key',pixKey.value);f.append('min_certificate_score',certScore.value);if(pixQR.files[0])f.append('pix_qr',pixQR.files[0]);await api('/api/admin/settings',{method:'PUT',body:f});alert('Salvo');adminSettings()}async function approve(id){await api('/api/admin/payments/'+id+'/approve',{method:'POST'});adminPayments()}async function rejectPay(id){await api('/api/admin/payments/'+id+'/reject',{method:'POST'});adminPayments()}
async function renderStudent(){if(page==='dashboard')return stDash();if(page==='course')return stCourse();if(page==='payment')return stPayment();if(page==='certificate')return stCert()}async function stDash(){setTitle('Início','Resumo');const d=await api('/api/student/dashboard');content.innerHTML=`<div class="grid g2">${d.enrollments.map(e=>`<div class="card"><h2>${e.title}</h2><p>${e.description}</p><p>Acesso: <span class="badge ${e.access_status==='active'?'ok':'warn'}">${e.access_status}</span></p><div class="progress"><span style="width:${e.progress}%"></span></div></div>`).join('')}</div>`}
async function stCourse(){setTitle('Meu curso','Aulas liberadas');const d=await api('/api/student/dashboard');const e=d.enrollments[0];if(!e){content.innerHTML='<div class="card">Nenhum curso.</div>';return}const c=await api('/api/student/course/'+e.course_id);if(c.enrollment.access_status!=='active'){content.innerHTML='<div class="card"><h2>Acesso bloqueado</h2><p>Aguarde o administrador aprovar seu pagamento.</p></div>';return}content.innerHTML=`<div class="card"><h2>${c.course.title}</h2>${c.lessons.map(l=>`<div class="lesson"><h3>${l.title}</h3><p>${l.content||l.summary}</p>${l.video_url?`<div class="video"><iframe src="${l.video_url}"></iframe></div>`:''}${l.video_file?`<div class="video"><video src="${l.video_file}" controls></video></div>`:''}${l.pdf_file?`<p><a href="${l.pdf_file}" target="_blank">Baixar PDF</a></p>`:''}<div class="actions"><button class="btn2" onclick="completeLesson(${l.id})">Marcar concluída</button><button class="btn" onclick="startQuiz(${l.id})">Quiz</button></div></div>`).join('')}</div>`}
async function stPayment(){setTitle('Pagamento','Pix e comprovante');const d=await api('/api/student/dashboard');content.innerHTML=`<div class="grid g2">${d.payments.map(p=>`<div class="card"><h2>Pagamento</h2><p>Valor: ${money(p.amount)}</p><p>Status: ${p.status}</p><p>Chave Pix: <b>${p.pix_key||publicData.settings.pix_key}</b></p>${p.pix_qr_file?`<img src="${p.pix_qr_file}" style="max-width:220px;background:white;padding:10px;border-radius:12px">`:''}<input type="file" id="receipt${p.id}" accept="image/*,.pdf"><button class="btn" onclick="sendReceipt(${p.id})">Enviar comprovante</button></div>`).join('')}</div>`}
async function sendReceipt(id){const f=new FormData();f.append('receipt',document.getElementById('receipt'+id).files[0]);await api('/api/student/payment/'+id+'/receipt',{method:'POST',body:f});alert('Comprovante enviado');stPayment()}async function completeLesson(id){await api('/api/student/lesson/'+id+'/complete',{method:'POST'});alert('Aula concluída')}async function startQuiz(id){try{const q=await api('/api/student/lesson/'+id+'/quiz');modal.style.display='grid';modalBody.innerHTML=`<h2>${q.lesson.title}</h2>${q.questions.map(x=>`<div class="lesson"><b>${x.question}</b><label><input type="radio" name="q${x.id}" value="0"> ${x.option_a}</label><br><label><input type="radio" name="q${x.id}" value="1"> ${x.option_b}</label><br><label><input type="radio" name="q${x.id}" value="2"> ${x.option_c}</label><br><label><input type="radio" name="q${x.id}" value="3"> ${x.option_d}</label></div>`).join('')}<button class="btn" onclick="finishQuiz(${id})">Finalizar</button><button class="btn2" onclick="modal.style.display='none'">Fechar</button>`}catch(e){alert(e.message)}}async function finishQuiz(id){const inputs=modalBody.querySelectorAll('input[type=radio]:checked');const answers={};inputs.forEach(i=>answers[i.name.replace('q','')]=i.value);const r=await api('/api/student/lesson/'+id+'/quiz',{method:'POST',body:JSON.stringify({answers})});alert('Nota: '+r.score+'%');modal.style.display='none'}async function stCert(){setTitle('Certificado','Gerar certificado');const d=await api('/api/student/dashboard');const e=d.enrollments[0];content.innerHTML=`<div class="card"><h2>Certificado</h2><p>Gere seu certificado quando atingir os requisitos.</p><button class="btn" onclick="genCert(${e?.course_id})">Gerar certificado</button><div id="certBox"></div></div>`}async function genCert(id){try{const r=await api('/api/student/course/'+id+'/certificate',{method:'POST'});certBox.innerHTML=`<div class="lesson"><h3>Código: ${r.certificate.code}</h3><p>Validação pública: /api/certificate/${r.certificate.code}</p></div>`}catch(e){alert(e.message)}}
async function courseModal(){modal.style.display='grid';modalBody.innerHTML='<h2>Curso</h2><input id="cTitle" placeholder="Título"><textarea id="cDesc" placeholder="Descrição"></textarea><input id="cPrice" type="number" placeholder="Preço"><input id="cWork" placeholder="Carga horária"><input id="cTeacher" placeholder="Professor"><button class="btn" onclick="saveCourse()">Salvar</button><button class="btn2" onclick="modal.style.display=`none`">Fechar</button>'}async function saveCourse(){const f=new FormData();f.append('title',cTitle.value);f.append('description',cDesc.value);f.append('price',cPrice.value);f.append('workload',cWork.value);f.append('teacher',cTeacher.value);await api('/api/admin/courses',{method:'POST',body:f});modal.style.display='none';adminCourses()}async function deleteCourse(id){if(confirm('Excluir curso?')){await api('/api/admin/courses/'+id,{method:'DELETE'});adminCourses()}}async function lessonModal(courseId){modal.style.display='grid';modalBody.innerHTML='<h2>Aula</h2><input id="lTitle" placeholder="Título"><input id="lModule" placeholder="Módulo"><textarea id="lSummary" placeholder="Resumo"></textarea><textarea id="lContent" placeholder="Conteúdo"></textarea><input id="lVideoUrl" placeholder="Link vídeo"><label>Vídeo</label><input id="lVideo" type="file" accept="video/*"><label>PDF</label><input id="lPdf" type="file" accept=".pdf"><input id="lPos" type="number" placeholder="Ordem"><button class="btn" onclick="saveLesson('+courseId+')">Salvar</button><button class="btn2" onclick="modal.style.display=`none`">Fechar</button>'}async function saveLesson(courseId){const f=new FormData();f.append('course_id',courseId);f.append('title',lTitle.value);f.append('module',lModule.value);f.append('summary',lSummary.value);f.append('content',lContent.value);f.append('video_url',lVideoUrl.value);f.append('position',lPos.value||0);if(lVideo.files[0])f.append('video',lVideo.files[0]);if(lPdf.files[0])f.append('pdf',lPdf.files[0]);await api('/api/admin/lessons',{method:'POST',body:f});modal.style.display='none';adminLessons()}async function deleteLesson(id){if(confirm('Excluir aula?')){await api('/api/admin/lessons/'+id,{method:'DELETE'});adminLessons()}}async function questions(lessonId){const q=await api('/api/admin/lessons/'+lessonId+'/questions');modal.style.display='grid';modalBody.innerHTML=`<h2>Quiz</h2><input id="qq" placeholder="Pergunta"><input id="qa" placeholder="A"><input id="qb" placeholder="B"><input id="qc" placeholder="C"><input id="qd" placeholder="D"><select id="correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select><button class="btn" onclick="addQuestion(${lessonId})">Adicionar</button>${q.questions.map(x=>`<div class="lesson">${x.question}<button class="bad" onclick="deleteQuestion(${x.id},${lessonId})">Excluir</button></div>`).join('')}`}async function addQuestion(lessonId){await api('/api/admin/questions',{method:'POST',body:JSON.stringify({lesson_id:lessonId,question:qq.value,option_a:qa.value,option_b:qb.value,option_c:qc.value,option_d:qd.value,correct_option:correct.value})});questions(lessonId)}async function deleteQuestion(id,lessonId){await api('/api/admin/questions/'+id,{method:'DELETE'});questions(lessonId)}modal.onclick=e=>{if(e.target===modal)modal.style.display='none'};
